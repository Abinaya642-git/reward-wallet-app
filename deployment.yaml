apiVersion: apps/v1
kind: Deployment
metadata:
  name: reward-wallet-app-deployment
  labels:
    app: reward-wallet-app

spec:
  replicas: 2
  selector:
    matchLabels:
      app: reward-wallet-app

  template:
    metadata:
      labels:
        app: reward-wallet-app

    spec:
      containers:
        - name: reward-wallet-app
          image: your-dockerhub/reward-wallet-app:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: reward-wallet-service

spec:
  type: NodePort
  selector:
    app: reward-wallet-app

  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30007